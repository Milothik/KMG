workflows:
  ios-simulator-build:
    name: iOS Simulator Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.kawaiimixer.game
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install
      - name: Prepare web assets
        script: |
          npm run prepare:ios-web
      - name: Generate Capacitor iOS project
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
      - name: Build unsigned simulator app
        script: |
          set -o pipefail
          mkdir -p /tmp/xcodebuild_logs build/ios/simulator
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee /tmp/xcodebuild_logs/ios-simulator.log
          APP_PATH=$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Debug-iphonesimulator/*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No simulator .app artifact found"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/ios/simulator/KawaiiMixer-simulator.app.zip
    artifacts:
      - build/ios/simulator/*.zip
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - /tmp/xcodebuild_logs/*.log
